# 所有宿主机端口可通过环境变量覆盖，避免端口冲突。
# 示例：BACKEND_PORT=18000 FRONTEND_PORT=13000 docker compose up --build -d
# 或在 .env 文件中设置。

services:
  # ── 基础设施 ──

  postgres:
    image: postgres:14
    container_name: evalscope-postgres
    environment:
      POSTGRES_USER: evalscope
      POSTGRES_PASSWORD: evalscope
      POSTGRES_DB: evalscope
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evalscope"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: evalscope-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 应用服务 ──

  backend:
    image: registry.ltkk.run/swaneval/backend:latest
    container_name: evalscope-backend
    volumes:
      - evalscope_data:/data
    environment:
      DATABASE_URL: "postgresql+asyncpg://evalscope:evalscope@postgres:5432/evalscope"
      DATABASE_URL_SYNC: "postgresql://evalscope:evalscope@postgres:5432/evalscope"
      REDIS_URL: "redis://redis:6379/0"
      CORS_ORIGINS: '["*"]'
      STORAGE_BACKEND: local
      STORAGE_ROOT: /data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: registry.ltkk.run/swaneval/frontend:latest
    container_name: evalscope-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      API_ENDPOINT: http://backend:8000/
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  evalscope_data:
