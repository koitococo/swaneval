# 所有宿主机端口可通过环境变量覆盖，避免端口冲突。
# 示例：BACKEND_PORT=18000 FRONTEND_PORT=13000 docker compose up --build -d
# 或在 .env 文件中设置。

services:
  # ── 基础设施 ──

  postgres:
    image: postgres:14
    container_name: evalscope-postgres
    environment:
      POSTGRES_USER: evalscope
      POSTGRES_PASSWORD: evalscope
      POSTGRES_DB: evalscope
    ports:
      - "${PG_PORT:-6001}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evalscope"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: evalscope-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 应用服务 ──

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: evalscope-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - evalscope_data:/data
    environment:
      DATABASE_URL: "postgresql+asyncpg://evalscope:evalscope@postgres:5432/evalscope"
      DATABASE_URL_SYNC: "postgresql://evalscope:evalscope@postgres:5432/evalscope"
      REDIS_URL: "redis://redis:6379/0"
      CORS_ORIGINS: '["*"]'
      STORAGE_BACKEND: local
      STORAGE_ROOT: /data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: evalscope-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:${BACKEND_PORT:-8000}/api/v1"
    depends_on:
      - backend
    restart: unless-stopped

  # ── 可选服务（需要 --profile 启用）──

  ollama:
    image: ollama/ollama:latest
    container_name: evalscope-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  minio:
    image: minio/minio:latest
    container_name: evalscope-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - s3

volumes:
  postgres_data:
  evalscope_data:
  ollama_data:
  minio_data:
