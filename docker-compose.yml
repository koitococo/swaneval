# 所有宿主机端口可通过环境变量覆盖，避免端口冲突。
# 示例：BACKEND_PORT=18000 FRONTEND_PORT=13000 docker compose up --build -d
# 或在 .env 文件中设置。

services:
  # ── 基础设施 ──

  postgres:
    image: postgres:14
    container_name: swaneval-postgres
    environment:
      POSTGRES_USER: swaneval
      POSTGRES_PASSWORD: swaneval
      POSTGRES_DB: swaneval
    ports:
      - "${PG_PORT:-6001}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swaneval"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: swaneval-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 应用服务 ──

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: swaneval-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - swaneval_data:/data
    environment:
      DATABASE_URL: "postgresql+asyncpg://swaneval:swaneval@postgres:5432/swaneval"
      DATABASE_URL_SYNC: "postgresql://swaneval:swaneval@postgres:5432/swaneval"
      REDIS_URL: "redis://redis:6379/0"
      CORS_ORIGINS: '["*"]'
      STORAGE_BACKEND: local
      STORAGE_ROOT: /data
      EVALSCOPE_SERVICE_URL: "http://evalscope:9000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      evalscope:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: swaneval-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:${BACKEND_PORT:-8000}/api/v1"
    depends_on:
      - backend
    restart: unless-stopped

  # ── EvalScope 评测引擎 ──

  evalscope:
    build:
      context: ./evalscope
      dockerfile: Dockerfile
    container_name: swaneval-evalscope
    ports:
      - "${EVALSCOPE_PORT:-9000}:9000"
    volumes:
      - swaneval_data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ⚠️ 安全警告 / Security Warning:
  # ms-enclave 需要 Docker daemon 来管理沙箱容器，因此必须挂载 docker.sock。
  # 这赋予了容器对宿主机 Docker 的完全控制权。
  # 仅在开发/测试环境使用此配置；生产环境应将 ms-enclave 部署在独立服务器上，
  # 并通过 EVALSCOPE_SANDBOX_URL 远程连接。
  evalscope-sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    container_name: swaneval-sandbox
    ports:
      - "${SANDBOX_PORT:-8000}:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DOCKER_HOST: "unix:///var/run/docker.sock"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - sandbox
    restart: unless-stopped

  # ── 独立 Worker（可选，用于生产环境水平扩展）──
  # 启用后需设置 backend 环境变量 EMBEDDED_WORKER=false
  # 用法：docker compose --profile worker up -d

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: swaneval-worker
    command: ["uv", "run", "python", "-m", "app.worker"]
    volumes:
      - swaneval_data:/data
    environment:
      DATABASE_URL: "postgresql+asyncpg://swaneval:swaneval@postgres:5432/swaneval"
      DATABASE_URL_SYNC: "postgresql://swaneval:swaneval@postgres:5432/swaneval"
      REDIS_URL: "redis://redis:6379/0"
      STORAGE_BACKEND: local
      STORAGE_ROOT: /data
      EVALSCOPE_SERVICE_URL: "http://evalscope:9000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      evalscope:
        condition: service_started
    restart: unless-stopped
    profiles:
      - worker

  # ── 可选服务（需要 --profile 启用）──

  ollama:
    image: ollama/ollama:latest
    container_name: swaneval-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  minio:
    image: minio/minio:latest
    container_name: swaneval-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - s3

volumes:
  postgres_data:
  swaneval_data:
  ollama_data:
  minio_data:
